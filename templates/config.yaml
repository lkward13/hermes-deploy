model:
  default: gpt-5.4-mini
  provider: openai-codex
  base_url: https://chatgpt.com/backend-api/codex
providers: {}
fallback_providers: []
credential_pool_strategies: {}
toolsets:
- hermes-cli
agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 180
  api_max_retries: 3
  service_tier: ''
  tool_use_enforcement: auto
  gateway_timeout_warning: 900
  gateway_notify_interval: 180
  gateway_auto_continue_freshness: 3600
  image_input_mode: auto
  disabled_toolsets: []
  verbose: false
  reasoning_effort: medium
  personalities:
    helpful: You are a helpful, friendly AI assistant.
    concise: You are a concise assistant. Keep responses brief and to the point.
terminal:
  backend: local
  modal_mode: auto
  cwd: .
  timeout: 180
  env_passthrough: []
  shell_init_files: []
  auto_source_bashrc: true
  docker_image: nikolaik/python-nodejs:python3.11-nodejs20
  persistent_shell: true
  lifetime_seconds: 300
browser:
  inactivity_timeout: 120
  command_timeout: 30
  record_sessions: false
  allow_private_urls: false
  auto_local_for_private_urls: true
  cdp_url: ''
  headless: true
  # --no-sandbox is required on Hetzner/Hostinger VPSes (Ubuntu 23.10+ blocks
  # unprivileged user namespaces, so Chrome's sandbox can't initialize).
  chromium_args: ['--no-sandbox']
image_gen:
  # Provider selection is driven by whether the client has supplied a personal
  # OPENAI_API_KEY in the NoDesk portal. The gateway sets IMAGE_GEN_PROVIDER
  # accordingly:
  #   * "openai"       — uses the API key for gpt-image-2 via OpenAI's REST API.
  #   * "openai-codex" — reuses the ChatGPT subscription auth.json written
  #                      during Codex OAuth setup (default; works without an
  #                      API key but cannot currently target gpt-image-2).
  provider: {{IMAGE_GEN_PROVIDER}}
  model: gpt-image-2-medium
  fallback_providers: []
checkpoints:
  enabled: true
  max_snapshots: 50
  auto_prune: false
  retention_days: 7
  delete_orphans: true
  min_interval_hours: 24
file_read_max_chars: 100000
tool_output:
  max_bytes: 50000
  max_lines: 2000
  max_line_length: 2000
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
  hygiene_hard_message_limit: 400
  summary_model: google/gemini-3-flash-preview
  summary_provider: auto
  summary_base_url: null
prompt_caching:
  cache_ttl: 5m
display:
  compact: false
  personality: helpful
  resume_display: full
  busy_input_mode: interrupt
  tui_auto_resume_recent: false
  bell_on_complete: false
  show_reasoning: false
  streaming: true
  final_response_markdown: strip
  inline_diffs: true
  show_cost: false
  skin: default
privacy:
  redact_pii: false
tts:
  provider: edge
  edge:
    voice: en-US-AriaNeural
stt:
  enabled: true
  provider: local
  local:
    model: base
    language: ''
voice:
  record_key: ctrl+b
  max_recording_seconds: 120
  auto_tts: false
context:
  engine: compressor
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6
delegation:
  inherit_mcp_toolsets: true
  max_iterations: 50
  child_timeout_seconds: 600
  max_concurrent_children: 3
  max_spawn_depth: 1
  orchestrator_enabled: true
  subagent_auto_approve: false
  default_toolsets:
  - terminal
  - file
  - web
skills:
  external_dirs: []
  template_vars: true
  inline_shell: false
  inline_shell_timeout: 10
  guard_agent_created: false
  creation_nudge_interval: 15
plugins:
  enabled:
  - codex-auth-router
  disabled: []
curator:
  enabled: true
  interval_hours: 168
  min_idle_hours: 2
  stale_after_days: 30
  archive_after_days: 90
  backup:
    enabled: true
    keep: 5
timezone: ''
approvals:
  mode: manual
  timeout: 60
  cron_mode: deny
security:
  allow_private_urls: false
  redact_secrets: true
  tirith_enabled: true
  tirith_path: tirith
  tirith_timeout: 5
  tirith_fail_open: true
cron:
  wrap_response: true
  max_parallel_jobs: null
code_execution:
  mode: project
  timeout: 300
  max_tool_calls: 50
logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3
model_catalog:
  enabled: true
  url: https://hermes-agent.nousresearch.com/docs/api/model-catalog.json
  ttl_hours: 24
sessions:
  auto_prune: false
  retention_days: 90
  vacuum_after_prune: true
  min_interval_hours: 24
streaming:
  enabled: false
platform_toolsets:
  cli:
  - hermes-cli
  telegram:
  - hermes-telegram
  whatsapp:
  - hermes-whatsapp
platforms:
  webhook:
    enabled: true
    extra:
      host: 0.0.0.0
      port: 8644
  telegram:
    enabled: true
  whatsapp:
    enabled: {{WHATSAPP_ENABLED}}
    extra:
      mode: "{{WHATSAPP_MODE}}"
_config_version: 11
group_sessions_per_user: true
